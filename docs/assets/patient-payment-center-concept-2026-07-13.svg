  <text x="204" y="278" fill="#6682a3" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15">本次就诊暂未产生待缴医疗项目</text>
  <rect x="590" y="237" width="69" height="37" rx="18.5" fill="#edf7ff"/>
