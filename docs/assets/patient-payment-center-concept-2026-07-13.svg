<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1180" viewBox="0 0 800 1180" role="img" aria-labelledby="title desc">
  <title id="title">患者端缴费中心改版示意图</title>
  <desc id="desc">与患者首页一致的蓝色渐变、圆角卡片和底部导航。空态提供查看缴费记录入口。</desc>
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1976f3"/>
      <stop offset="1" stop-color="#27b9e6"/>
    </linearGradient>
    <linearGradient id="canvas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaf5ff"/>
      <stop offset="1" stop-color="#f7fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#527da9" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="800" height="1180" fill="#edf5fc"/>
