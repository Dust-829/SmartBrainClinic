version: '3.8'

services:
  # ==========================================
  # Infrastructure Services
  # ==========================================
  postgres:
    image: pgvector/pgvector:pg15
    container_name: his_postgres
    environment:
      POSTGRES_USER: lujuntong
      POSTGRES_PASSWORD: his_password
      POSTGRES_DB: his_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: his_redis
    ports:
      - "6379:6379"
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: his_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: his_nacos
    environment:
      - PREFER_HOST_MODE=hostname
      - MODE=standalone
    ports:
      - "8848:8848"
      - "9848:9848"
    restart: always

  # ==========================================
  # Microservices Configuration Anchor
  # ==========================================
  x-microservice-config: &microservice-config
    build: .
    env_file: .env
    environment:
      APP_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: lujuntong
      DB_PASSWORD: his_password
      DB_NAME: his_db
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      NACOS_SERVER_ADDR: nacos:8848
      AUTH_SERVICE_URL: http://auth:8001/api/v1/auth
      PATIENT_SERVICE_URL: http://patient:8002/api/v1/patient
      MEDICAL_SERVICE_URL: http://medical:8003/api/v1/medical
      PHARMACY_SERVICE_URL: http://pharmacy:8004/api/v1/pharmacy
      BILLING_SERVICE_URL: http://billing:8005/api/v1/billing
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      nacos:
        condition: service_started
    restart: on-failure

  # ==========================================
  # Microservices
  # ==========================================
  gateway:
    <<: *microservice-config
    container_name: his_gateway
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"

  auth:
    <<: *microservice-config
    container_name: his_auth
    command: ["uvicorn", "app.microservices.auth.main:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"

  patient:
    <<: *microservice-config
    container_name: his_patient
    command: ["uvicorn", "app.microservices.patient.main:app", "--host", "0.0.0.0", "--port", "8002"]
    ports:
      - "8002:8002"

  medical:
    <<: *microservice-config
    container_name: his_medical
    command: ["uvicorn", "app.microservices.medical.main:app", "--host", "0.0.0.0", "--port", "8003"]
    ports:
      - "8003:8003"

  pharmacy:
    <<: *microservice-config
    container_name: his_pharmacy
    command: ["uvicorn", "app.microservices.pharmacy.main:app", "--host", "0.0.0.0", "--port", "8004"]
    ports:
      - "8004:8004"

  billing:
    <<: *microservice-config
    container_name: his_billing
    command: ["uvicorn", "app.microservices.billing.main:app", "--host", "0.0.0.0", "--port", "8005"]
    ports:
      - "8005:8005"

volumes:
  postgres_data:
